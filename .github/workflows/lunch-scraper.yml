name: Daily Lunch Specials Scraper

on:
  schedule:
    # Run daily at 9 AM UTC (adjust timezone as needed)
    - cron: '0 9 * * 1-5'  # Weekdays only
  
  # Allow manual trigger
  workflow_dispatch:

jobs:
  scrape-and-post:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run lunch scraper
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RESTAURANTS_URL: ${{ secrets.RESTAURANTS_URL }}
        run: python scraper.py
      
      - name: Log failure
        if: failure()
        run: echo "❌ Lunch scraper failed. Check logs above."
