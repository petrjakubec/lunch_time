name: Daily Lunch Specials Scraper

on:
  schedule:
    # Run at 9 AM UTC, weekdays
    - cron: '0 9 * * 1-5'
    # Run at 10:45 AM UTC, weekdays
    - cron: '45 10 * * 1-5'
  
  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  scrape-and-post:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run lunch scraper
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RESTAURANTS_URL: ${{ secrets.RESTAURANTS_URL }}
        run: python scraper.py
      
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      
      - name: Log failure
        if: failure()
        run: echo "❌ Lunch scraper failed. Check logs above."
